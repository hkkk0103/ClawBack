<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawBack小助手</title>
  <link rel="icon" type="image/png" sizes="32x32" href="shilltracer-assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="shilltracer-assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="shilltracer-assets/favicon/apple-touch-icon.png">
  <link rel="shortcut icon" href="shilltracer-assets/favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#09090e;
      --surface:#101019;
      --surface-2:#141420;
      --border:#26263a;
      --accent:#ff4d2d;
      --accent-soft:rgba(255,77,45,.12);
      --text:#f3f3fb;
      --muted:#a8a8bd;
      --soft:#ffd8cf;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Noto Sans SC',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(255,77,45,.10), transparent 32%),
        linear-gradient(180deg,#0b0b10 0%,#09090e 100%);
      min-height:100vh;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,77,45,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,77,45,.028) 1px, transparent 1px);
      background-size:30px 30px;
      pointer-events:none;
      z-index:0;
    }
    .page{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:28px 24px 80px}
    .topbar-shell{max-width:1180px;margin:0 auto;}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:0 0 18px;flex-wrap:wrap}
    .brand,.nav a,.tool-link,.label{font-family:'Space Mono',monospace}
    .brand{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#ffab99;font-weight:700}
    .nav{display:flex;gap:10px;flex-wrap:wrap}
    .nav a{
      color:#ffd8cf;
      text-decoration:none;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      padding:10px 14px;
      border-radius:999px;
      font-size:12px;
      transition:.18s ease;
    }
    .nav a:hover,.tool-card:hover{transform:translateY(-2px)}
    .hero{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:28px;
      align-items:center;
      min-height:560px;
      padding:26px 0 34px;
    }
    .label{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,77,45,.24);
      background:var(--accent-soft);
      color:#ffb3a3;
      font-size:11px;
      letter-spacing:1.8px;
      margin-bottom:20px;
    }
    .hero h1{
      font-size:76px;
      line-height:.96;
      letter-spacing:-2.6px;
      margin-bottom:18px;
    }
    .hero p{
      max-width:640px;
      font-size:18px;
      line-height:1.9;
      color:var(--soft);
    }
    .hero-art{
      position:relative;
      min-height:520px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .hero-art::before{
      content:'';
      position:absolute;
      width:380px;
      height:380px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,77,45,.22) 0%, rgba(255,77,45,.08) 38%, transparent 72%);
      filter:blur(8px);
    }
    .hero-art img{
      position:relative;
      z-index:1;
      width:min(100%,520px);
      object-fit:contain;
      filter:drop-shadow(0 28px 60px rgba(0,0,0,.35));
    }
    .section{margin-top:24px}
    .section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:18px}
    .section-head h2{font-size:28px}
    .section-head p{color:var(--muted);font-size:14px}
    .tool-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .tool-card{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-height:390px;
      background:linear-gradient(180deg,rgba(255,77,45,.05) 0%, rgba(16,16,25,.96) 36%);
      border:1px solid var(--border);
      border-radius:26px;
      padding:24px;
      text-decoration:none;
      color:inherit;
      box-shadow:0 22px 50px rgba(0,0,0,.22);
      transition:.18s ease;
    }
    .tool-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .tool-badge{
      font-family:'Space Mono',monospace;
      font-size:11px;
      letter-spacing:1.6px;
      color:#ffb8a8;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,77,45,.22);
      background:rgba(255,77,45,.08);
    }
    .tool-card h3{font-size:36px;line-height:1.08;margin-top:16px}
    .tool-card p{font-size:15px;line-height:1.85;color:#cfcfe0;margin-top:12px;max-width:520px}
    .tool-preview{
      margin:22px 0 18px;
      min-height:180px;
      border-radius:22px;
      background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.01));
      border:1px solid rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .tool-preview img{max-width:72%;max-height:170px;object-fit:contain;filter:drop-shadow(0 20px 36px rgba(0,0,0,.3))}
    .tool-footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:auto}
    .tool-tags{display:flex;gap:8px;flex-wrap:wrap}
    .tool-tags span{
      font-family:'Space Mono',monospace;
      font-size:11px;
      color:#a8a8bd;
      padding:5px 8px;
      border-radius:999px;
      background:#0f0f17;
      border:1px solid rgba(255,255,255,.06);
    }
    .tool-link{color:#fff;font-size:12px;letter-spacing:1px}
    .footer-note{margin-top:34px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:11px;color:#6b6b7d;opacity:.82;letter-spacing:.2px}
    .footer-note span{color:#8d8da3}
    @media (max-width: 960px){
      .hero,.tool-grid{grid-template-columns:1fr}
      .hero{min-height:auto;padding-top:12px}
      .hero h1{font-size:52px}
      .hero-art{min-height:340px;order:-1}
      .tool-card{min-height:unset}
      .page{padding:18px 16px 56px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar-shell">
    <header class="topbar">
      <div class="brand">ClawBack</div>
      <nav class="nav">
        <a href="#tools">工具入口</a>
        <a href="detective.html">龙虾侦探</a>
        <a href="alert.html">出货预警助手</a>
      </nav>
    </header>
    </div>

    <section class="hero">
      <div>
        <div class="label">ClawBack Assistant</div>
        <h1>ClawBack小助手</h1>
        <p>盯盘、追踪、预警，先从这里进入。</p>
      </div>
      <div class="hero-art">
        <img src="shilltracer-assets/characters/clawback-helper-hero.png" alt="ClawBack小助手">
      </div>
    </section>

    <section class="section" id="tools">
      <div class="section-head">
        <h2>工具入口</h2>
        <p>选择你要用的工具</p>
      </div>

      <div class="tool-grid">
        <a class="tool-card" href="detective.html">
          <div>
            <div class="tool-top">
              <div class="tool-badge">Main Tool</div>
            </div>
            <h3>龙虾侦探</h3>
            <p>链上追踪与钱包分析主工具。</p>
            <div class="tool-preview">
              <img src="shilltracer-assets/mascot-frames/frame_0000.png" alt="龙虾侦探">
            </div>
          </div>
          <div class="tool-footer">
            <div class="tool-tags">
              <span>On-Chain</span>
              <span>Tracking</span>
              <span>GMGN</span>
            </div>
            <div class="tool-link">进入 ↗</div>
          </div>
        </a>

        <a class="tool-card" href="alert.html">
          <div>
            <div class="tool-top">
              <div class="tool-badge">Chrome Extension</div>
            </div>
            <h3>出货预警助手</h3>
            <p>GMGN / DeBot 前排出货提醒插件。</p>
            <div class="tool-preview">
              <img src="shilltracer-assets/tool-mascots/gmgn-hud/lobster-transparent.png" alt="出货预警助手">
            </div>
          </div>
          <div class="tool-footer">
            <div class="tool-tags">
              <span>Plugin</span>
              <span>Alert</span>
              <span>GMGN</span>
            </div>
            <div class="tool-link">进入 ↗</div>
          </div>
        </a>
      </div>
    </section>

    <div class="footer-note">如果对你有帮助，感谢打赏 BSC：<span>0x79d2e508070337c66b3e7c2d7bf427232c9a0536</span></div>
  </div>
</body>
</html>
